name: Issue Check with Validation Comments

on:
  # Manual trigger with optional single issue number
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to check (leave empty to check all)'
        required: false
        type: string
      issue_type:
        description: 'Issue type to check'
        required: false
        type: choice
        default: 'all'
        options:
          - all
          - new
          - old
  
  # Scheduled checks
  schedule:
    # Daily check for new issues (created within last 7 days) at 2 AM UTC
    - cron: '0 2 * * *'
    # Monthly check for old issues (older than 7 days) on 1st of month at 3 AM UTC
    - cron: '0 3 1 * *'

jobs:
  check-new-issues:
    # Run on: manual trigger with 'new', 'all', or single issue; or daily schedule
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 2 * * *'
    
    runs-on: ubuntu-latest
    
    name: Check New Issues (< 7 days)
    
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      
      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("jsonlite", "httr", "dplyr", "xml2", "stringr"))'
      
      - name: Install gbifbf package
        run: |
          Rscript -e 'install.packages("./gbifbf", repos = NULL, type = "source")'
      
      - name: Make scripts executable
        run: |
          chmod +x issue_check.sh
          chmod +x create_github_label.sh
          chmod +x create_github_comment.sh
      
      - name: Check single issue (if specified)
        if: github.event.inputs.issue_number != ''
        run: |
          echo "Processing single issue: ${{ github.event.inputs.issue_number }}"
          bash issue_check.sh --report-comment ${{ github.event.inputs.issue_number }}
      
      - name: Fetch and check new issues
        if: github.event.inputs.issue_number == ''
        run: |
          echo "Fetching new issues (created within last 7 days)..."
          
          # Calculate date 7 days ago
          SEVEN_DAYS_AGO=$(date -d '7 days ago' '+%Y-%m-%d')
          
          # Fetch new issues created after the calculated date
          NEW_ISSUES=$(gh issue list \
            --repo gbif/backbone-feedback \
            --search "is:issue is:open project:gbif/23 created:>=$SEVEN_DAYS_AGO" \
            --json number \
            --jq '.[].number' \
            --limit 500)
          
          if [ -z "$NEW_ISSUES" ]; then
            echo "No new issues found"
            exit 0
          fi
          
          echo "Found new issues: $NEW_ISSUES"
          
          # Process each new issue
          for issue in $NEW_ISSUES; do
            echo "Processing issue #$issue"
            bash issue_check.sh --report-comment $issue || echo "Failed to process issue #$issue"
          done
      
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: new-issues-report-${{ github.run_number }}
          path: report.tsv
          retention-days: 30

  check-old-issues:
    # Run on: manual trigger with 'old' or 'all'; or monthly schedule
    if: |
      (github.event_name == 'workflow_dispatch' && 
       (github.event.inputs.issue_type == 'old' || github.event.inputs.issue_type == 'all')) ||
      github.event.schedule == '0 3 1 * *'
    
    runs-on: ubuntu-latest
    
    name: Check Old Issues (> 7 days)
    
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      
      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("jsonlite", "httr", "dplyr", "xml2", "stringr"))'
      
      - name: Install gbifbf package
        run: |
          Rscript -e 'install.packages("./gbifbf", repos = NULL, type = "source")'
      
      - name: Make scripts executable
        run: |
          chmod +x issue_check.sh
          chmod +x create_github_label.sh
          chmod +x create_github_comment.sh
      
      - name: Fetch and check old issues
        run: |
          echo "Fetching old issues (created more than 7 days ago)..."
          
          # Calculate date 7 days ago
          SEVEN_DAYS_AGO=$(date -d '7 days ago' '+%Y-%m-%d')
          
          # Fetch old issues created before the calculated date
          OLD_ISSUES=$(gh issue list \
            --repo gbif/backbone-feedback \
            --search "is:issue is:open project:gbif/23 created:<$SEVEN_DAYS_AGO" \
            --json number \
            --jq '.[].number' \
            --limit 500)
          
          if [ -z "$OLD_ISSUES" ]; then
            echo "No old issues found"
            exit 0
          fi
          
          echo "Found old issues: $OLD_ISSUES"
          
          # Process each old issue
          for issue in $OLD_ISSUES; do
            echo "Processing issue #$issue"
            bash issue_check.sh --report-comment $issue || echo "Failed to process issue #$issue"
          done
      
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: old-issues-report-${{ github.run_number }}
          path: report.tsv
          retention-days: 30
